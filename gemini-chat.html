<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gemini Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #111009;
  --panel:     #19160e;
  --surface:   #221e14;
  --surface2:  #2c2718;
  --border:    rgba(196,158,82,0.14);
  --border2:   rgba(196,158,82,0.07);
  --gold:      #c49e52;
  --gold-dim:  rgba(196,158,82,0.55);
  --gold-glow: rgba(196,158,82,0.10);
  --cream:     #e8dcc8;
  --muted:     #7a6e58;
  --danger:    #c46252;
  --radius:    14px;
  --sidebar-w: 270px;
  --header-h:  56px;
  --font-mono: 'IBM Plex Mono', monospace;
  --font-sans: 'IBM Plex Sans', sans-serif;
  --font-disp: 'Playfair Display', serif;
}

html, body { height: 100%; background: var(--bg); color: var(--cream); font-family: var(--font-sans); font-size: 14.5px; line-height: 1.65; overflow: hidden; }

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 180px;
  pointer-events: none; z-index: 100; opacity: 0.55;
}

#shell { display: flex; height: 100vh; height: 100dvh; }

/* SIDEBAR */
#sidebar {
  width: var(--sidebar-w);
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  flex-shrink: 0; overflow: hidden;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}

.sidebar-logo { padding: 22px 22px 18px; border-bottom: 1px solid var(--border2); }

.logo-mark {
  font-family: var(--font-disp);
  font-size: 20px; font-weight: 700; color: var(--gold);
  letter-spacing: -0.3px; display: flex; align-items: center; gap: 9px;
}
.logo-sub { font-size: 10px; color: var(--muted); font-family: var(--font-mono); font-weight: 300; margin-top: 4px; letter-spacing: 0.8px; text-transform: uppercase; }

.sb-section { padding: 20px 22px 0; }
.section-label {
  font-family: var(--font-mono); font-size: 9.5px; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--muted); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border2); }

.key-wrap { position: relative; margin-bottom: 6px; }
.key-wrap input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  color: var(--cream); font-family: var(--font-mono); font-size: 12px; font-weight: 300;
  padding: 9px 36px 9px 11px; border-radius: 9px; outline: none; transition: border-color 0.2s;
}
.key-wrap input:focus { border-color: var(--gold-dim); }
.key-wrap input::placeholder { color: var(--muted); }
.key-eye { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 2px; transition: color 0.2s; }
.key-eye:hover { color: var(--gold); }
.key-status { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.3px; padding: 4px 2px; color: var(--muted); }
.key-status.ok { color: #7aad6e; }
.key-status.err { color: var(--danger); }

.model-list { display: flex; flex-direction: column; gap: 3px; margin-bottom: 18px; }
.model-item {
  padding: 10px 12px; border-radius: 9px; border: 1px solid transparent;
  cursor: pointer; transition: all 0.18s; background: transparent;
  text-align: left; color: var(--cream); font-family: var(--font-sans); width: 100%;
}
.model-item:hover { background: var(--surface); border-color: var(--border2); }
.model-item.active { background: var(--gold-glow); border-color: var(--border); }
.model-name { font-size: 13px; font-weight: 500; display: flex; align-items: center; justify-content: space-between; }
.model-active-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); display: none; flex-shrink: 0; }
.model-item.active .model-active-dot { display: block; }
.model-tag { font-family: var(--font-mono); font-size: 9.5px; color: var(--muted); margin-top: 2px; font-weight: 300; }

.sidebar-footer { margin-top: auto; padding: 16px 22px; border-top: 1px solid var(--border2); }
.btn-clear { width: 100%; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.5px; padding: 9px; border-radius: 9px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
.btn-clear:hover { border-color: var(--danger); color: var(--danger); }

/* MAIN */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

#mob-header { display: none; height: var(--header-h); border-bottom: 1px solid var(--border); align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; background: var(--panel); }
.mob-logo { font-family: var(--font-disp); font-size: 18px; font-weight: 700; color: var(--gold); flex: 1; }
.mob-model-select { background: var(--surface); border: 1px solid var(--border); color: var(--cream); font-family: var(--font-mono); font-size: 11px; padding: 6px 10px; border-radius: 8px; outline: none; cursor: pointer; }
.mob-model-select option { background: var(--panel); }
.btn-mob-menu { background: var(--surface); border: 1px solid var(--border); color: var(--muted); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
.btn-mob-menu:hover { color: var(--gold); }

#chat { flex: 1; overflow-y: auto; padding: 32px 0; scrollbar-width: thin; scrollbar-color: var(--surface2) transparent; }
#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

.chat-inner { max-width: 720px; margin: 0 auto; padding: 0 28px; display: flex; flex-direction: column; gap: 28px; }

#empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; gap: 12px; animation: fadeUp 0.5s ease both; }
.empty-glyph { font-family: var(--font-disp); font-size: 52px; color: var(--gold); opacity: 0.2; line-height: 1; }
.empty-title { font-family: var(--font-disp); font-size: 22px; font-weight: 600; color: var(--cream); opacity: 0.35; }
.empty-sub { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.5px; text-align: center; line-height: 1.8; }

.message { display: flex; gap: 14px; animation: fadeUp 0.3s cubic-bezier(0.16,1,0.3,1) both; }
.message.user { flex-direction: row-reverse; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.avatar { width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 2px; }
.message.user .avatar { background: var(--surface2); color: var(--gold-dim); border: 1px solid var(--border); font-family: var(--font-mono); font-size: 11px; font-weight: 500; }
.message.ai .avatar { background: var(--gold-glow); color: var(--gold); border: 1px solid var(--border); font-family: var(--font-disp); font-size: 16px; }

.msg-col { flex: 1; min-width: 0; }
.message.user .msg-col { display: flex; flex-direction: column; align-items: flex-end; }

.msg-meta { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-bottom: 5px; letter-spacing: 0.3px; display: flex; align-items: center; gap: 8px; }
.message.user .msg-meta { flex-direction: row-reverse; }

.bubble { display: inline-block; max-width: 100%; padding: 13px 16px; border-radius: var(--radius); font-size: 14px; line-height: 1.75; border: 1px solid transparent; word-break: break-word; }
.message.user .bubble { background: var(--surface2); border-color: var(--border); border-bottom-right-radius: 4px; white-space: pre-wrap; }
.message.ai .bubble { background: transparent; border: none; padding: 0; }

.bubble p { margin-bottom: 10px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble h1, .bubble h2, .bubble h3 { font-family: var(--font-disp); font-weight: 600; color: var(--gold); margin: 16px 0 8px; line-height: 1.3; }
.bubble h1 { font-size: 18px; }
.bubble h2 { font-size: 16px; }
.bubble h3 { font-size: 14.5px; }
.bubble ul, .bubble ol { padding-left: 18px; margin: 8px 0; }
.bubble li { margin: 5px 0; }
.bubble strong { color: var(--cream); font-weight: 500; }
.bubble em { color: var(--gold-dim); font-style: italic; }
.bubble a { color: var(--gold); text-decoration: underline; text-underline-offset: 2px; }
.bubble hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

code.ic { font-family: var(--font-mono); font-size: 12.5px; background: var(--surface2); border: 1px solid var(--border); padding: 1px 6px; border-radius: 5px; color: #d4b483; }

.code-block { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin: 12px 0; overflow: hidden; }
.code-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; border-bottom: 1px solid var(--border2); font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
.code-copy { background: none; border: none; color: var(--muted); font-family: var(--font-mono); font-size: 10px; cursor: pointer; transition: color 0.2s; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.code-copy:hover { color: var(--gold); }
.code-block pre { padding: 14px; overflow-x: auto; font-family: var(--font-mono); font-size: 12.5px; font-weight: 300; line-height: 1.6; color: #c9b98a; }
.code-block pre code { background: none; border: none; padding: 0; color: inherit; }

.msg-actions { display: flex; gap: 6px; margin-top: 7px; opacity: 0; transition: opacity 0.2s; }
.msg-col:hover .msg-actions { opacity: 1; }
.action-btn { font-family: var(--font-mono); font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.6px; padding: 3px 9px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.18s; }
.action-btn:hover { color: var(--gold); }

.typing-row { display: flex; gap: 14px; animation: fadeUp 0.3s ease both; }
.typing-dots { display: flex; align-items: center; gap: 5px; padding: 14px 0; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); opacity: 0.4; animation: pulse 1.3s ease-in-out infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100% { opacity:0.2; transform:scale(0.8); } 40% { opacity:0.9; transform:scale(1); } }

/* INPUT */
#input-wrap { border-top: 1px solid var(--border); padding: 16px 24px 20px; background: var(--bg); flex-shrink: 0; }
.input-shell { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
.textarea-row { display: flex; align-items: flex-end; gap: 10px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 10px 10px 10px 16px; transition: border-color 0.2s; }
.textarea-row:focus-within { border-color: var(--gold-dim); }
#prompt { flex: 1; background: none; border: none; color: var(--cream); font-family: var(--font-sans); font-size: 14.5px; font-weight: 300; outline: none; resize: none; min-height: 24px; max-height: 150px; line-height: 1.6; padding-top: 2px; }
#prompt::placeholder { color: var(--muted); }
#send-btn { width: 38px; height: 38px; border-radius: 9px; background: var(--gold); border: none; color: #111009; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s, transform 0.15s; }
#send-btn:hover { opacity: 0.88; transform: scale(1.04); }
#send-btn:active { transform: scale(0.97); }
#send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
#send-btn svg { width: 15px; height: 15px; fill: currentColor; }
.input-footer { display: flex; align-items: center; justify-content: space-between; font-family: var(--font-mono); font-size: 10px; color: var(--muted); padding: 0 2px; }
.model-pill { background: var(--surface); border: 1px solid var(--border2); color: var(--gold-dim); padding: 3px 9px; border-radius: 20px; font-size: 10px; font-family: var(--font-mono); }

#toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--surface2); border: 1px solid var(--border); color: var(--cream); font-family: var(--font-mono); font-size: 12px; padding: 8px 20px; border-radius: 30px; opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.16,1,0.3,1); z-index: 200; white-space: nowrap; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

#overlay { display: none; position: fixed; inset: 0; background: rgba(8,8,5,0.75); z-index: 49; backdrop-filter: blur(2px); }

/* RESPONSIVE */
@media (max-width: 700px) {
  #sidebar { position: fixed; top: 0; left: 0; bottom: 0; z-index: 50; transform: translateX(-100%); box-shadow: 4px 0 30px rgba(0,0,0,0.6); }
  #sidebar.open { transform: translateX(0); }
  #overlay.active { display: block; }
  #mob-header { display: flex; }
  #input-wrap { padding: 12px 14px 18px; }
  .chat-inner { padding: 0 16px; }
  #chat { padding: 20px 0; }
}

@media (min-width: 701px) and (max-width: 960px) {
  :root { --sidebar-w: 230px; }
  .chat-inner { padding: 0 20px; }
}

@media (max-height: 500px) and (orientation: landscape) {
  :root { --header-h: 44px; }
  #chat { padding: 12px 0; }
  .chat-inner { gap: 16px; }
  #input-wrap { padding: 10px 16px 12px; }
  .empty-glyph { font-size: 36px; }
  .empty-title { font-size: 16px; }
}
</style>
</head>
<body>
<div id="shell">

  <aside id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
          <path d="M10 2L12.5 7.5L18 10L12.5 12.5L10 18L7.5 12.5L2 10L7.5 7.5L10 2Z" fill="#c49e52"/>
        </svg>
        Gemini Studio
      </div>
      <div class="logo-sub">Powered by Google AI</div>
    </div>

    <div class="sb-section" style="margin-top:20px;">
      <div class="section-label">Model</div>
      <div class="model-list" id="model-list"></div>
    </div>

    <div class="sidebar-footer">
      <button class="btn-clear" onclick="clearChat()">Hapus Percakapan</button>
    </div>
  </aside>

  <div id="overlay" onclick="closeSidebar()"></div>

  <div id="main">
    <div id="mob-header">
      <button class="btn-mob-menu" onclick="openSidebar()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <rect y="2" width="16" height="1.5" rx="0.75"/>
          <rect y="7.25" width="16" height="1.5" rx="0.75"/>
          <rect y="12.5" width="16" height="1.5" rx="0.75"/>
        </svg>
      </button>
      <div class="mob-logo">Gemini Studio</div>
      <select class="mob-model-select" id="mob-model-select" onchange="setModel(this.value)"></select>
    </div>

    <div id="chat">
      <div class="chat-inner" id="chat-inner">
        <div id="empty-state">
          <div class="empty-glyph">✦</div>
          <div class="empty-title">Mulai percakapan</div>
          <div class="empty-sub">Masukkan API key · pilih model<br>lalu ketik pesan pertamamu</div>
        </div>
      </div>
    </div>

    <div id="input-wrap">
      <div class="input-shell">
        <div class="textarea-row">
          <textarea id="prompt" rows="1" placeholder="Ketik pesan..." oninput="autoResize(this)"></textarea>
          <button id="send-btn" onclick="send()">
            <svg viewBox="0 0 16 16"><path d="M1.5 1.5l13 6.5-13 6.5V9.5l9-1.5-9-1.5V1.5z"/></svg>
          </button>
        </div>
        <div class="input-footer">
          <span>Enter kirim &nbsp;·&nbsp; Shift+Enter baris baru</span>
          <span class="model-pill" id="active-model-pill">—</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const MODELS = [
  { id: 'gemini-2.5-flash',  name: 'Gemini 2.5 Flash', tag: 'Terbaru · Cepat'         },
  { id: 'gemini-2.5-pro',    name: 'Gemini 2.5 Pro',   tag: 'Terbaru · Paling Pintar' },
  { id: 'gemini-2.0-flash',  name: 'Gemini 2.0 Flash', tag: 'Stabil · Cepat'          },
  { id: 'gemini-1.5-pro',    name: 'Gemini 1.5 Pro',   tag: 'Konteks Panjang'         },
  { id: 'gemini-1.5-flash',  name: 'Gemini 1.5 Flash', tag: 'Ringan & Hemat'          },
];

let activeModel = MODELS[0].id;
let history = [];
let typingEl = null;

// ── Model UI ──
function buildModelUI() {
  const list = document.getElementById('model-list');
  const mob  = document.getElementById('mob-model-select');
  list.innerHTML = mob.innerHTML = '';
  MODELS.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'model-item' + (m.id === activeModel ? ' active' : '');
    btn.dataset.id = m.id;
    btn.innerHTML = `<div class="model-name"><span>${m.name}</span><span class="model-active-dot"></span></div><div class="model-tag">${m.tag}</div>`;
    btn.onclick = () => setModel(m.id);
    list.appendChild(btn);

    const opt = document.createElement('option');
    opt.value = m.id; opt.textContent = m.name;
    if (m.id === activeModel) opt.selected = true;
    mob.appendChild(opt);
  });
  updatePill();
}

function setModel(id) {
  activeModel = id;
  document.querySelectorAll('.model-item').forEach(b => b.classList.toggle('active', b.dataset.id === id));
  document.getElementById('mob-model-select').value = id;
  updatePill();
  showToast('Model: ' + (MODELS.find(m => m.id === id)?.name || id));
}

function updatePill() {
  document.getElementById('active-model-pill').textContent = MODELS.find(m => m.id === activeModel)?.name || activeModel;
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Mobile sidebar ──
function openSidebar()  { document.getElementById('sidebar').classList.add('open');    document.getElementById('overlay').classList.add('active'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); }

// ── Textarea ──
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 150) + 'px'; }

// ── Markdown ──
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function parseMarkdown(raw) {
  let t = escHtml(raw);

  // Fenced code blocks
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<div class="code-block"><div class="code-header"><span>${lang||'code'}</span><button class="code-copy" onclick="copyCode(this)">Salin</button></div><pre><code>${code.trim()}</code></pre></div>`);

  t = t.replace(/`([^`\n]+)`/g, '<code class="ic">$1</code>');
  t = t.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  t = t.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  t = t.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  t = t.replace(/^# (.+)$/gm,   '<h1>$1</h1>');
  t = t.replace(/^---+$/gm, '<hr>');
  t = t.replace(/((?:^[*\-] .+\n?)+)/gm, m =>
    '<ul>' + m.trim().split('\n').map(l => `<li>${l.replace(/^[*\-] /,'')}</li>`).join('') + '</ul>');
  t = t.replace(/((?:^\d+\. .+\n?)+)/gm, m =>
    '<ol>' + m.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /,'')}</li>`).join('') + '</ol>');

  t = t.split(/\n{2,}/).map(c => {
    c = c.trim(); if (!c) return '';
    return /^<(h[123]|ul|ol|hr|div|pre)/.test(c) ? c : `<p>${c.replace(/\n/g,'<br>')}</p>`;
  }).join('\n');

  return t;
}

function copyCode(btn) {
  const code = btn.closest('.code-block').querySelector('pre code').textContent;
  navigator.clipboard.writeText(code).then(() => { btn.textContent='Tersalin ✓'; setTimeout(()=>btn.textContent='Salin',1800); });
}

function timeStr() { return new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}); }

// ── Append message ──
function appendMessage(role, text) {
  const ci = document.getElementById('chat-inner');
  const es = document.getElementById('empty-state');
  if (es) es.remove();

  const isUser = role === 'user';
  const row = document.createElement('div');
  row.className = `message ${role}`;

  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = isUser ? 'KA' : '✦';

  const col = document.createElement('div');
  col.className = 'msg-col';

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  const modelName = MODELS.find(m=>m.id===activeModel)?.name || activeModel;
  meta.innerHTML = `<span>${isUser ? 'Kamu' : modelName}</span><span>${timeStr()}</span>`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (isUser) { bubble.textContent = text; }
  else        { bubble.innerHTML = parseMarkdown(text); }

  const actions = document.createElement('div');
  actions.className = 'msg-actions';
  const copyBtn = document.createElement('button');
  copyBtn.className = 'action-btn'; copyBtn.textContent = 'Salin';
  copyBtn.onclick = () => navigator.clipboard.writeText(text).then(() => { copyBtn.textContent='Tersalin ✓'; setTimeout(()=>copyBtn.textContent='Salin',1800); });
  actions.appendChild(copyBtn);

  col.appendChild(meta); col.appendChild(bubble); col.appendChild(actions);
  row.appendChild(av); row.appendChild(col);
  ci.appendChild(row);
  document.getElementById('chat').scrollTop = 99999;
}

// ── Typing ──
function showTyping() {
  const ci = document.getElementById('chat-inner');
  typingEl = document.createElement('div');
  typingEl.className = 'typing-row';
  typingEl.innerHTML = `<div class="avatar" style="background:var(--gold-glow);border:1px solid var(--border);color:var(--gold);font-family:var(--font-disp);font-size:16px;">✦</div><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  ci.appendChild(typingEl);
  document.getElementById('chat').scrollTop = 99999;
}
function hideTyping() { if (typingEl) { typingEl.remove(); typingEl = null; } }

// ── Clear ──
function clearChat() {
  history = [];
  document.getElementById('chat-inner').innerHTML = `<div id="empty-state"><div class="empty-glyph">✦</div><div class="empty-title">Mulai percakapan</div><div class="empty-sub">Masukkan API key · pilih model<br>lalu ketik pesan pertamamu</div></div>`;
  showToast('Percakapan dihapus');
  closeSidebar();
}

// ── Send ──
async function send() {



  const promptEl = document.getElementById('prompt');
  const text = promptEl.value.trim();
  if (!text) return;

  promptEl.value = ''; promptEl.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  appendMessage('user', text);
  history.push({ role: 'user', parts: [{ text }] });
  showTyping();

  try {
    const res = await fetch("https://oravex.azrielprabamukti6.workers.dev/chat", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    model: activeModel,
    contents: history
  })
});

    const data = await res.json();
    hideTyping();

    if (!res.ok) {
      const msg = data?.error?.message || `HTTP ${res.status}`;
      appendMessage('ai', `⚠ Error dari API: ${msg}`);
      history.pop(); return;
    }

    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (reply) { history.push({ role:'model', parts:[{text:reply}] }); appendMessage('ai', reply); }
    else       { appendMessage('ai', '⚠ Tidak ada respons dari model.'); }

  } catch(e) {
    hideTyping();
    appendMessage('ai', `⚠ Koneksi gagal: ${e.message}`);
    history.pop();
  } finally {
    document.getElementById('send-btn').disabled = false;
    promptEl.focus();
  }
}

document.getElementById('prompt').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

buildModelUI();
</script>
