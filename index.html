<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Cloud Notes</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap"
rel="stylesheet"
/>

<style>

*, *::before, *::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

:root{

  --bg:#0e0e0e;
  --surface:#161616;
  --surface2:#1e1e1e;
  --border:#2a2a2a;

  --text:#e8e8e8;
  --muted:#666;

  --accent:#c8f06e;
  --danger:#f06e6e;

  --radius:10px;

  --mono:'DM Mono', monospace;
  --sans:'DM Sans', sans-serif;
}

body{

  background:var(--bg);
  color:var(--text);

  font-family:var(--sans);

  height:100vh;

  overflow:hidden;
}

#loginScreen{

  height:100vh;

  display:flex;
  flex-direction:column;

  justify-content:center;
  align-items:center;

  animation:fadeIn .3s ease;
}

.login-logo{

  font-family:var(--mono);

  font-size:12px;

  letter-spacing:.2em;

  text-transform:uppercase;

  color:var(--muted);

  margin-bottom:40px;
}

.login-logo span{
  color:var(--accent);
}

.login-card{

  width:340px;

  background:var(--surface);

  border:1px solid var(--border);

  border-radius:14px;

  padding:32px;

  display:flex;
  flex-direction:column;

  gap:16px;
}

.login-card h1{

  font-family:var(--mono);

  font-size:18px;

  font-weight:400;
}

.input-row{

  display:flex;
  gap:8px;
}

input{

  flex:1;

  background:var(--bg);

  border:1px solid var(--border);

  color:var(--text);

  border-radius:var(--radius);

  padding:12px 14px;

  font-family:var(--mono);

  font-size:16px;

  outline:none;

  transition:.15s;
}

input:focus{
  border-color:var(--accent);
}

.btn{

  background:var(--surface2);

  border:1px solid var(--border);

  color:var(--text);

  border-radius:var(--radius);

  padding:12px 16px;

  cursor:pointer;

  transition:.15s;

  font-family:var(--sans);

  font-size:13px;
}

.btn:hover{

  background:#262626;
}

.btn-primary{

  background:var(--accent);

  color:#111;

  border:none;

  font-weight:500;
}

.btn-primary:hover{

  background:#d8f880;
}

.btn-danger{

  color:var(--danger);
}

.btn-danger:hover{

  background:rgba(240,110,110,.08);

  border-color:var(--danger);
}

.btn-icon{

  padding:10px 12px;
}

#error{

  height:18px;

  font-size:12px;

  color:var(--danger);

  font-family:var(--mono);

  text-align:center;
}

#app{

  display:none;

  height:100vh;
}

#sidebar{

  width:250px;

  background:var(--surface);

  border-right:1px solid var(--border);

  display:flex;

  flex-direction:column;

  overflow:hidden;
}

.sidebar-header{

  padding:16px;

  border-bottom:1px solid var(--border);

  display:flex;

  align-items:center;
  justify-content:space-between;
}

.sidebar-logo{

  font-family:var(--mono);

  font-size:12px;

  letter-spacing:.12em;

  text-transform:uppercase;

  color:var(--muted);
}

.sidebar-logo b{
  color:var(--accent);
}

#notesList{

  flex:1;

  overflow-y:auto;

  padding:10px;
}

.noteItem{

  padding:12px;

  border-radius:var(--radius);

  cursor:pointer;

  margin-bottom:5px;

  border:1px solid transparent;

  transition:.12s;
}

.noteItem:hover{

  background:var(--surface2);
}

.noteItem.active{

  background:var(--surface2);

  border-color:var(--border);
}

.noteItem-title{

  font-family:var(--mono);

  font-size:13px;

  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.noteItem.active
.noteItem-title{

  color:var(--accent);
}

.empty-state{

  color:var(--muted);

  text-align:center;

  padding:30px 15px;

  font-family:var(--mono);

  font-size:12px;

  line-height:1.8;
}

#editor{

  flex:1;

  display:flex;
  flex-direction:column;

  overflow:hidden;
}

#topBar{

  min-height:60px;

  padding:14px 20px;

  border-bottom:1px solid var(--border);

  display:flex;

  align-items:center;
  justify-content:space-between;

  gap:12px;
}

#noteTitle{

  font-family:var(--mono);

  font-size:14px;

  white-space:nowrap;

  overflow:hidden;

  text-overflow:ellipsis;
}

#noteTitle.placeholder{
  color:var(--muted);
}

.topBar-actions{

  display:flex;
  gap:8px;
}

#editorWrap{

  flex:1;

  display:flex;

  flex-direction:column;

  padding:20px;

  overflow:hidden;
}

textarea{

  flex:1;

  width:100%;

  background:transparent;

  border:none;

  color:var(--text);

  resize:none;

  outline:none;

  font-family:var(--mono);

  font-size:16px;

  line-height:1.8;

  caret-color:var(--accent);
}

textarea::placeholder{
  color:var(--muted);
}

.editor-footer{

  display:flex;

  align-items:center;

  justify-content:space-between;

  margin-top:12px;

  padding-top:12px;

  border-top:1px solid var(--border);
}

.word-count{

  color:var(--muted);

  font-family:var(--mono);

  font-size:11px;
}

#saveStatus{

  color:var(--accent);

  font-family:var(--mono);

  font-size:11px;

  opacity:0;

  transition:.2s;
}

#saveStatus.visible{
  opacity:1;
}

.remember-row{

  display:flex;

  align-items:center;

  gap:8px;

  color:#888;

  font-size:13px;
}

.remember-row input{

  width:auto;
}

@media (max-width:700px){

  #app{
    flex-direction:column;
  }

  #sidebar{

    width:100%;

    height:220px;

    border-right:none;

    border-bottom:1px solid var(--border);
  }

  #editor{

    height:calc(100vh - 220px);
  }

  #editorWrap{

    padding:14px;
  }

  #topBar{

    padding:12px 14px;
  }

  .login-card{

    width:90vw;
  }

  textarea,
  input{

    font-size:16px;
  }
}

@keyframes fadeIn{

  from{
    opacity:0;
    transform:translateY(6px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
</head>
<body>

<div id="loginScreen">

  <div class="login-logo">
    ☁ cloud<span>notes</span>
  </div>

  <div class="login-card">

    <h1>
      Welcome back
    </h1>

    <div class="input-row">

      <input
        type="password"
        id="password"
        placeholder="Enter password"
        onkeydown="
          if(event.key==='Enter')
          login()
        "
      />

      <button
        class="btn btn-icon"
        onclick="togglePassword()"
      >
        👁
      </button>

    </div>

    <label class="remember-row">

      <input
        type="checkbox"
        id="rememberMe"
      >

      Remember me

    </label>

    <button
      class="btn btn-primary"
      onclick="login()"
    >
      Enter
    </button>

    <div id="error"></div>

  </div>

</div>

<div id="app">

  <div id="sidebar">

    <div class="sidebar-header">

      <div class="sidebar-logo">
        ☁ <b>notes</b>
      </div>

      <button
        class="btn btn-icon"
        onclick="createNote()"
      >
        ＋
      </button>

    </div>

    <div id="notesList">

      <div class="empty-state">
        no notes yet<br>
        press ＋ to create one
      </div>

    </div>

  </div>

  <div id="editor">

    <div id="topBar">

      <div
        id="noteTitle"
        class="placeholder"
      >
        no note selected
      </div>

      <div class="topBar-actions">

        <button
          class="btn"
          onclick="saveNote()"
        >
          save
        </button>

        <button
          class="btn btn-danger"
          onclick="deleteNote()"
        >
          delete
        </button>

      </div>

    </div>

    <div id="editorWrap">

      <textarea
        id="note"
        placeholder="Start writing..."
      ></textarea>

      <div class="editor-footer">

        <div
          class="word-count"
          id="wordCount"
        >
          0 words
        </div>

        <div id="saveStatus">
          saved ✓
        </div>

      </div>

    </div>

  </div>

</div>

<script>

const API =
"https://cloud-notes.azrielprabamukti6.workers.dev";

let PASSWORD = "";

let currentNote = "";

let saveTimer = null;

let isSaving = false;

function togglePassword(){

  const input =
    document.getElementById("password");

  input.type =
    input.type === "password"
    ? "text"
    : "password";
}

async function login(){

  const btn =
    document.querySelector(".btn-primary");

  btn.disabled = true;

  btn.innerText = "…";

  PASSWORD =
    document.getElementById("password").value;

  const remember =

    document.getElementById(
      "rememberMe"
    ).checked;

  if(remember){

    localStorage.setItem(
      "cloudNotesPassword",
      PASSWORD
    );
  }
  else{

    localStorage.removeItem(
      "cloudNotesPassword"
    );
  }

  try{

    const response =
      await fetch(
        API +
        "/list?password=" +
        PASSWORD
      );

    if(response.status === 401){

      document.getElementById("error")
        .innerText =
        "wrong password";

      btn.disabled = false;

      btn.innerText = "Enter";

      return;
    }

    document.getElementById("loginScreen")
      .style.display = "none";

    document.getElementById("app")
      .style.display = "flex";

    await loadNotesList();
  }
  catch(err){

    document.getElementById("error")
      .innerText =
      "cannot connect to server";

    btn.disabled = false;

    btn.innerText = "Enter";
  }
}

async function loadNotesList(){

  const response =
    await fetch(
      API +
      "/list?password=" +
      PASSWORD
    );

  const notes =
    await response.json();

  const list =
    document.getElementById("notesList");

  list.innerHTML = "";

  if(!notes.length){

    list.innerHTML =

    `<div class="empty-state">
      no notes yet<br>
      press ＋ to create one
    </div>`;

    return;
  }

  notes.forEach(name => {

    const div =
      document.createElement("div");

    div.className =
      "noteItem" +
      (
        name === currentNote
        ? " active"
        : ""
      );

    div.innerHTML =

    `<div class="noteItem-title">
      ${escHtml(name)}
    </div>`;

    div.onclick = () => {
      openNote(name);
    };

    list.appendChild(div);
  });
}

async function createNote(){

  const name =
    prompt("Note name?");

  if(!name) return;

  currentNote = name;

  document.getElementById("note")
    .value = "";

  setTitle(name);

  updateWordCount();

  await saveNote();

  await loadNotesList();
}

async function openNote(name){

  currentNote = name;

  const response =
    await fetch(

      API +

      "?password=" +
      PASSWORD +

      "&note=" +
      encodeURIComponent(name)
    );

  const text =
    await response.text();

  document.getElementById("note")
    .value = text;

  setTitle(name);

  updateWordCount();

  await loadNotesList();
}

async function saveNote(){

  if(!currentNote){
    return;
  }

  if(isSaving){
    return;
  }

  isSaving = true;

  const text =
    document.getElementById("note")
    .value;

  try{

    await fetch(API, {

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({

        password:PASSWORD,

        note:currentNote,

        text:text
      })
    });

    showSaved();
  }
  catch(err){

    console.error(err);
  }

  isSaving = false;
}

async function deleteNote(){

  if(!currentNote){
    return;
  }

  if(
    !confirm(
      'Delete "' +
      currentNote +
      '"?'
    )
  ){
    return;
  }

  await fetch(API, {

    method:"DELETE",

    headers:{
      "Content-Type":"application/json"
    },

    body:JSON.stringify({

      password:PASSWORD,

      note:currentNote
    })
  });

  currentNote = "";

  document.getElementById("note")
    .value = "";

  setTitle(null);

  updateWordCount();

  await loadNotesList();
}

document
.getElementById("note")
.addEventListener("input", () => {

  updateWordCount();

  clearTimeout(saveTimer);

  saveTimer =
    setTimeout(
      saveNote,
      1500
    );
});

function setTitle(name){

  const el =
    document.getElementById("noteTitle");

  if(name){

    el.innerText = name;

    el.classList.remove("placeholder");
  }
  else{

    el.innerText =
      "no note selected";

    el.classList.add("placeholder");
  }
}

function showSaved(){

  const el =
    document.getElementById("saveStatus");

  el.classList.add("visible");

  setTimeout(() => {

    el.classList.remove("visible");

  }, 1200);
}

function updateWordCount(){

  const text =
    document.getElementById("note")
    .value
    .trim();

  const count =
    text
    ? text.split(/\s+/).length
    : 0;

  document.getElementById("wordCount")
    .innerText =

    count +
    (
      count === 1
      ? " word"
      : " words"
    );
}

function escHtml(s){

  return s

    .replace(/&/g,"&amp;")

    .replace(/</g,"&lt;")

    .replace(/>/g,"&gt;")

    .replace(/"/g,"&quot;");
}

window.onload = () => {

  const savedPassword =

    localStorage.getItem(
      "cloudNotesPassword"
    );

  if(savedPassword){

    document
      .getElementById("password")
      .value = savedPassword;

    document
      .getElementById("rememberMe")
      .checked = true;

    login();
  }
};

</script>

</body>
</html>
